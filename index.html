<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEON STUDY AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <header>
      ⚡ NEON STUDY AI
      <span id="clock"></span>
    </header>

    <div class="grid">

      <!-- WEATHER -->
      <div class="card">
        <h3>🌦 Weather</h3>
        <p id="weather">Loading...</p>
      </div>

      <!-- AI TUTOR -->
      <div class="card big">
        <h3>🤖 AI TUTOR</h3>

        <textarea id="aiInput" placeholder="Ask your study question..."></textarea>
        <button onclick="askAI()">Ask AI</button>

        <div id="aiBox">Ready to help you study 📚</div>
      </div>

      <!-- NOTES -->
      <div class="card">
        <h3>📝 Quick Notes</h3>
        <textarea id="notes" placeholder="Write notes here..."></textarea>
      </div>

    </div>

  </div>

  <script src="java.js"></script>
</body>
</html>
